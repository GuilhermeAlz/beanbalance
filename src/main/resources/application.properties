spring.application.name=beanbalance

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/beanbalance
spring.datasource.username=beanbalance
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=bG9uZ19zZWNyZXRfa2V5X2Zvcl9iZWFuYmFsYW5jZV9hcHBsaWNhdGlvbl8yMDI2
app.jwt.expiration-ms=86400000

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
